name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Linting ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src/ api/ scripts/ tests/

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Training smoke test ─────────────────────────────────────────────────────
  training-smoke:
    name: Training Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        run: python scripts/train.py --output-json /tmp/train_results.json
        env:
          MLFLOW_TRACKING_URI: file:///tmp/mlruns
          LOG_LEVEL: INFO

      - name: Verify model artifact exists
        run: |
          test -f models/iris_classifier.pkl && echo "✅ Model artifact present" || exit 1
          test -f models/label_encoder.pkl && echo "✅ Label encoder present" || exit 1

      - name: Print training results
        run: cat /tmp/train_results.json

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: training-smoke

    steps:
      - uses: actions/checkout@v4

      - name: Build training image
        run: docker build -f docker/Dockerfile.train -t ml-pipeline-trainer .

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t ml-pipeline-api .
